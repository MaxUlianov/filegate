<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/stylesheet.css">
    <title>FileGate</title>
</head>
<body class="flex w-full h-screen">
    <!-- sidebar -->
    {{ $currentPage := "clipboard" }}
    {{ template "sidebar.html" $currentPage }}

    <!-- main container -->
    <div class="lg:ml-56 flex-1 flex-col h-screen">

        <!-- navbar (mobile only) -->
        <div class="lg:hidden fixed left-0 lg:left-56 right-0 top-0 p-4 bg-zinc-50 flex justify-between items-center">

            <!-- hamburger (mobile only) -->
            <button class="lg:hidden p-1 rounded-md hover:bg-gray-200" onclick="toggleSidebar()" aria-label="Open menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            
            <script>
                function toggleSidebar() {
                    const sidebar = document.getElementById('sidebar');
                    const overlay = document.getElementById('sidebar-overlay');
                    const isOpen = !sidebar.classList.contains('-translate-x-full');
                    sidebar.classList.toggle('-translate-x-full', isOpen);
                    overlay.classList.toggle('hidden', isOpen);
                }
            </script>
        </div>

        <div class="w-3/4 mx-auto flex flex-col h-full py-4 sm:pt-0 pt-16">
            <div class="flex-1 overflow-y-auto justify-end pb-4">
              {{range .}}
                <div class="flex max-w-3/4 w-full">
                    <pre class="my-2 p-2 rounded-e-xl rounded-es-xl bg-gray-200 break-all">{{.}}</pre>
                </div>
              {{end}}
            </div>
            
            <form action="/clipboard/" method="post" id="clipboardForm" class="w-full sticky bottom-0 mb-4">
              <div class="flex items-stretch space-x-2 w-full">
                <textarea 
                  autofocus
                  id="clipboardInput" 
                  name="clipboardInput" 
                  class="flex-1 p-2 text-gray-700 bg-white border-2 border-gray-300 ring-gray-300 focus:outline-none focus:border-gray-500 rounded-md" 
                  placeholder="Enter text..." 
                  rows="2"
                ></textarea>

                <button 
                  type="submit" 
                  class="shrink-0 px-4 bg-gray-500 text-white rounded hover:bg-gray-300 hover:text-gray-500"
                >
                  Save
                </button>
              </div>
            </form>

        </div>
    </div>
    <script>
    document.getElementById('clipboardInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('clipboardForm').submit();
      }
    });
    </script>
    
</body>
</html>
